<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hawaiʻi Marine & Freshwater Managed Areas</title>
  <meta name="description" content="Interactive map of Hawaii's managed marine and freshwater areas, maintained by the Division of Aquatic Resources." />
  <meta property="og:title" content="Hawaiʻi Marine & Freshwater Managed Areas" />
  <meta property="og:description" content="Interactive map of Hawaii's managed marine and freshwater areas." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="map-interface">

    <!--
      Single panel, single DOM.
      #panel holds both views; data-view="list"|"info" switches them.
      CSS positions it as a left sidebar on desktop, bottom sheet on mobile.
      All content — island list, info, search — lives here exactly once.
    -->
    <aside id="panel" class="panel" data-view="list"
           role="complementary" aria-label="Areas and rules">

      <!-- ── PANEL HEADER ──────────────────────────────────────
           One header element. Content changes with data-view.
           - List view: brand logos + title + desktop collapse btn
           - Info view: back btn (prominent) + area title + share + close
      ──────────────────────────────────────────────────────── -->
      <header class="panel-header" id="panel-header">

        <!-- List header content -->
        <div class="panel-header__list">
          <!-- Mobile grip handle -->
          <div class="panel-header__grip" id="panel-grip" aria-hidden="true">
            <span class="grip-bar"></span>
          </div>
          <div class="panel-header__brand">
            <img class="brand-logo"
                 src="https://devdar.rapidteksolutions.com/wp-content/themes/react-ts-theme/assets/img/logo-dar.png"
                 alt="Division of Aquatic Resources logo" width="32" height="32" />
            <div class="brand-title-block">
              <h1 class="brand-title-main">Managed Areas</h1>
            </div>
            <img class="brand-logo"
                 src="https://devdar.rapidteksolutions.com/wp-content/themes/react-ts-theme/assets/img/logo-state-of-hawai.png"
                 alt="State of Hawaiʻi logo" width="32" height="32" />
          </div>
          <!-- Desktop collapse button -->
          <button class="panel-collapse-btn" id="panel-collapse-btn"
                  type="button" aria-label="Collapse panel" title="Collapse panel">
            <span class="panel-collapse-btn__icon">‹</span>
          </button>
        </div>

        <!-- Info header content -->
        <div class="panel-header__info">
          <!-- Mobile grip handle -->
          <div class="panel-header__grip" aria-hidden="true">
            <span class="grip-bar"></span>
          </div>
          <div class="panel-header__info-row">
            <button class="panel-back-btn" id="panel-back-btn"
                    type="button" aria-label="Back to areas list">
              <span class="panel-back-btn__arrow">←</span>
              <span class="panel-back-btn__label">Areas List</span>
            </button>
            <span class="panel-info-title" id="panel-info-title"
                  aria-live="polite">Area Info</span>
            <div class="panel-header__actions">
              <button class="panel-share-btn" id="panel-share-btn"
                      type="button" aria-label="Share this area" title="Share">
                <span aria-hidden="true">⬆</span>
              </button>
              <button class="panel-close-btn" id="panel-close-btn"
                      type="button" aria-label="Close and return to list" title="Close">
                <span aria-hidden="true">✕</span>
              </button>
            </div>
          </div>
        </div>

      </header><!-- /.panel-header -->

      <!-- ── LIST VIEW ──────────────────────────────────────── -->
      <div class="panel-view panel-view--list">
        <div class="panel-search">
          <div class="search-input-wrapper">
            <label for="area-search" class="sr-only">Search areas</label>
            <input type="text" id="area-search" placeholder="Search areas…"
                   autocomplete="off" spellcheck="false" aria-controls="island-list" />
            <button class="search-clear-btn" id="search-clear-btn"
                    type="button" aria-label="Clear search">✕</button>
            <span class="search-icon" aria-hidden="true">🔍</span>
          </div>
        </div>
        <div id="island-list" class="island-list" role="list"
             aria-label="Areas grouped by island" aria-live="polite" aria-busy="true">
          <div class="loading-notice" role="status">Loading marine areas…</div>
        </div>
      </div>

      <!-- ── INFO VIEW ──────────────────────────────────────── -->
      <div class="panel-view panel-view--info">
        <div id="info-content" class="info-content"></div>
      </div>

    </aside><!-- /#panel -->

    <!-- Desktop panel-collapsed reveal tab -->
    <button class="panel-reveal-btn" id="panel-reveal-btn"
            type="button" aria-label="Open areas panel" title="Open panel">
      <span class="panel-reveal-btn__icon">›</span>
    </button>

    <!-- Share toast -->
    <div class="share-toast" id="share-toast" role="status" aria-live="polite" hidden>
      Link copied!
    </div>

    <div id="map" role="application"
         aria-label="Interactive map of Hawaii managed areas"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="script.js"></script>
</body>
</html>
