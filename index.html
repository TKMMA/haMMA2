<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Hawaiʻi Marine & Freshwater Managed Areas</title>
  <meta name="description" content="Interactive map of Hawaii's managed marine and freshwater areas, maintained by the Division of Aquatic Resources." />

  <meta property="og:title" content="Hawaiʻi Marine & Freshwater Managed Areas" />
  <meta property="og:description" content="Interactive map of Hawaii's managed marine and freshwater areas." />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="map-interface">

    <!--
      Single-DOM architecture — #island-list, #info-content, #area-search
      exist exactly once. CSS repositions them between desktop panels and
      the mobile bottom sheet via the .map-interface__panels wrapper.

      DESKTOP: .map-sidebar and .info-sidebar float over the map.
      MOBILE:  .map-sidebar becomes the bottom sheet (translateY driven by
               data-snap + is-expanded). data-view="list"|"info" on
               .map-interface__panels shows the correct aside.
    -->

    <div class="map-interface__panels" id="panels" data-view="list">

      <!-- ── LIST PANEL ─────────────────────────────────────── -->
      <aside id="map-sidebar" class="map-sidebar" role="complementary"
             aria-label="Marine and freshwater areas list">

        <!-- Brand header — also the mobile sheet banner (list view).
             .sheet__handle-btn is hidden on desktop via CSS.             -->
        <header class="brand-panel" id="brand-panel">
          <button class="sheet__handle-btn" id="sheet-handle-btn"
                  type="button" aria-label="Expand areas list"
                  aria-expanded="false">
            <span class="sheet__grip" aria-hidden="true"></span>
          </button>
          <div class="brand-header">
            <img class="brand-logo"
                 src="https://devdar.rapidteksolutions.com/wp-content/themes/react-ts-theme/assets/img/logo-dar.png"
                 alt="Division of Aquatic Resources logo" width="36" height="36" />
            <div class="brand-title-block">
              <h1 class="brand-title-main">Managed Areas</h1>
            </div>
            <img class="brand-logo"
                 src="https://devdar.rapidteksolutions.com/wp-content/themes/react-ts-theme/assets/img/logo-state-of-hawai.png"
                 alt="State of Hawaiʻi logo" width="36" height="36" />
          </div>
        </header>

        <div class="sidebar-search-wrap">
          <div class="search-input-wrapper">
            <label for="area-search" class="sr-only">Search marine and freshwater areas</label>
            <input type="text" id="area-search" placeholder="Search areas…"
                   autocomplete="off" spellcheck="false" aria-controls="island-list" />
            <button class="search-clear-btn" type="button"
                    aria-label="Clear search" id="search-clear-btn">✕</button>
            <span class="search-icon" aria-hidden="true">🔍</span>
          </div>
        </div>

        <div id="island-list" class="island-list" role="list"
             aria-label="Areas grouped by island" aria-live="polite" aria-busy="true">
          <div class="loading-notice" role="status">Loading marine areas…</div>
        </div>

      </aside>

      <!-- ── INFO PANEL ─────────────────────────────────────── -->
      <aside id="info-sidebar" class="info-sidebar" role="region"
             aria-label="Area details" aria-live="polite">

        <!-- Desktop header -->
        <div class="info-panel-header">
          <span class="info-panel-header__title" id="info-banner-title"
                aria-live="polite">Area Info</span>
        </div>

        <!-- Mobile info header: handle + back + title -->
        <div class="info-mobile-header" id="info-mobile-header">
          <button class="sheet__handle-btn" id="info-handle-btn"
                  type="button" aria-label="Expand area details"
                  aria-expanded="false">
            <span class="sheet__grip" aria-hidden="true"></span>
          </button>
          <div class="info-mobile-header__row">
            <button class="sheet__back-btn" id="sheet-back-btn"
                    type="button" aria-label="Back to areas list">← Areas List</button>
            <span class="info-mobile-header__title"
                  id="info-banner-title-mobile">Area Info</span>
          </div>
        </div>

        <div id="info-content" class="info-content"></div>

      </aside>

    </div><!-- /#panels -->

    <div id="map" role="application"
         aria-label="Interactive map of Hawaii managed areas"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="script.js"></script>
</body>
</html>
